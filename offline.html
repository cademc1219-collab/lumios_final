<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumio — You're Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf7f2;--cream2:#f4ede0;--brown:#2c1a0e;--brown3:#8b6340;--brown4:#b8956a;--brown5:#d4b896}
body{font-family:'Source Sans 3',sans-serif;background:var(--brown);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{text-align:center;max-width:400px}
.icon{font-size:64px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--cream);margin-bottom:36px;display:flex;align-items:center;justify-content:center;gap:6px}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--brown5)}
h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:10px}
p{font-size:14px;color:var(--brown5);font-weight:300;line-height:1.7;margin-bottom:24px}
.tip{background:rgba(255,255,255,0.07);border-radius:12px;padding:16px;margin-bottom:24px;font-size:13px;color:var(--brown5);line-height:1.6;border:1px solid rgba(255,255,255,0.1)}
.tip strong{color:var(--cream);font-weight:600}
.retry-btn{padding:12px 28px;border-radius:10px;border:none;background:var(--cream);color:var(--brown);font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.retry-btn:hover{background:#f4ede0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lumio <span class="logo-dot"></span></div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Lumio needs an internet connection to load. Check your connection and try again.</p>
  <div class="tip"><strong>Tip:</strong> Once you're back online, Lumio will load instantly. Any sets you've studied recently may still be available from your browser cache.</div>
  <button class="retry-btn" onclick="window.location.reload()">Try again</button>
</div>
<script>
window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
